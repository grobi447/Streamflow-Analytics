apiVersion: apps/v1
kind: Deployment
metadata:
  name: vertica
  namespace: streamflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vertica
  template:
    metadata:
      labels:
        app: vertica
    spec:
      containers:
      - name: vertica
        image: jbfavre/vertica:latest
        ports:
        - containerPort: 5433
        - containerPort: 5444
        env:
        - name: APP_DB_USER
          valueFrom:
            secretKeyRef:
              name: vertica-secret
              key: username
        - name: APP_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vertica-secret
              key: password
        - name: APP_DB_NAME
          valueFrom:
            secretKeyRef:
              name: vertica-secret
              key: database
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"