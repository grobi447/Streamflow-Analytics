apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: streamflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: localhost/streamflow/api-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8001"
            - name: INGESTION_SERVICE_URL
              value: "http://ingestion-service:8002"
            - name: ANALYTICS_SERVICE_URL
              value: "http://analytics-service:8003"
            - name: ALERT_SERVICE_URL
              value: "http://alert-service:8004"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
