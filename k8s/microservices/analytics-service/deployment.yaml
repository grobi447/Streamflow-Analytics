apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: streamflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: localhost/streamflow/analytics-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8003
          envFrom:
            - secretRef:
                name: vertica-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
