<div class="main-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>StreamFlow</h2>
        </div>
        <nav>
            <a routerLink="/app/dashboard" routerLinkActive="active">Dashboard</a>
            <a routerLink="/app/analytics" routerLinkActive="active">Analytics</a>
            <a routerLink="/app/alerts" routerLinkActive="active">Alerts</a>
        </nav>
        <div class="sidebar-footer">
            <span>{{ username }}</span>
            <button (click)="logout()">Logout</button>
        </div>
    </aside>
    <main class="content">
        <router-outlet />
    </main>
</div>
