<div class="analytics">
    <div class="page-header">
        <div>
            <h1>Analytics</h1>
            <p class="subtitle">Historical network performance analysis</p>
        </div>
        <div class="time-range-buttons">
            @for (range of timeRanges; track range.label) {
            <button class="time-btn" [class.active]="selectedMinutes === range.minutes"
                (click)="selectRange(range.minutes)">
                {{ range.label }}
            </button>
            }
        </div>
    </div>

    <div class="chart-grid-2">
        <div class="card">
            <app-packet-loss-chart [trends]="trends" />
        </div>
        <div class="card">
            <app-signal-chart [devices]="devices" />
        </div>
    </div>

    <div class="card full-width">
        <app-location-heatmap [devices]="devices" />
    </div>

    <div class="card full-width">
        <app-device-table [devices]="devices" />
    </div>
</div>
